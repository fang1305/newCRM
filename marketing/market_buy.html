										<!--<div class="form-group line_top">

										    <input type="number" class="form-control tab_info" />

							</div>

	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script type="text/javascript" src="../bootstrap-3.3.7-dist/js/bootstrap.min.js"></script>

	<script src="http://cdn.static.runoob.com/libs/angular.js/1.4.6/angular.min.js"></script>
	<script type="text/javascript" src="../js/index.js"></script>
	<script type="text/javascript">
		$('.search_list li a').click(function(){
			$('.search_type span').eq(0).html($(this).html());
		})
		$(function () {

		    //1.初始化Table
		    var oTable = new TableInit();
		    oTable.Init();
		
		    //2.初始化Button的点击事件
		    var oButtonInit = new ButtonInit();
		    oButtonInit.Init();
			
			$(document).on('click','.add_btn',function(){
				var num = parseInt($(this).prev('input').val())+1;
				$(this).prev('input').val(num)
			});
			$(document).on('click','.min_btn',function(){
				var num = parseInt($(this).next('input').val());
				if(num > 1){
					num = num-1;
				}
				$(this).next('input').val(num)
			})
		});


var TableInit = function () {
    var oTableInit = new Object();
    
    //初始化Table
    oTableInit.Init = function () {
        $('#table').bootstrapTable({
            url: '../data/login_info2.json',         //请求后台的URL（*）
            method: 'get',                      //请求方式（*）
            toolbar: '#toolbar',                //工具按钮用哪个容器
            striped: true,                      //是否显示行间隔色
            cache: false,                       //是否使用缓存，默认为true，所以一般情况下需要设置一下这个属性（*）
            pagination: true,                   //是否显示分页（*）
            sortable: true,                     //是否启用排序
            sortOrder: "asc",                   //排序方式
            queryParams: oTableInit.queryParams,//传递参数（*）
            sidePagination: "server",           //分页方式：client客户端分页，server服务端分页（*）
            pageNumber:1,                       //初始化加载第一页，默认第一页
            pageSize: 10,                       //每页的记录行数（*）
            pageList: [10, 25, 50, 100],        //可供选择的每页的行数（*）
            search: false,                       //是否显示表格搜索，此搜索是客户端搜索，不会进服务端，所以，个人感觉意义不大
            strictSearch: true,
            showColumns: false,                  //是否显示所有的列
            showRefresh: false,                  //是否显示刷新按钮
            minimumCountColumns: 1,             //最少允许的列数
            clickToSelect: false,                //是否启用点击选中行
//          height: 500,                        //行高，如果没有设置height属性，表格自动根据记录条数觉得表格高度
            uniqueId: "uid",                     //每一行的唯一标识，一般为主键列
            showToggle:false,                    //是否显示详细视图和列表视图的切换按钮
            cardView: false,                    //是否显示详细视图
            detailView: false,                   //是否显示父子表
            responseHandler:ress,
            onCheck:check,
			columns: [{
			checkbox: true,valign: 'middle'
			}
			, {
			sortable:"true",
			field: 'name',
			title: '产品',
			valign: 'middle'
			}, {
			field: 'price',
			title: '价格',
			valign: 'middle'
			}, {
			sortable:"true",
			field: 'sale',
			title: '折扣',
			valign: 'middle'
			}, {
			field: 'num',
			title: '数量',
			width: 125, // 定义列的宽度，单位为像素px
            formatter: function (value, row, index) {
                return '<div class="input-group">\
					  <span class="input-group-addon min_btn">-</span>\
					  <input type="text" class="form-control" value=1>\
					  <span class="input-group-addon add_btn">+</span>\
					</div>';
            }
			}
			]


        });
   };
	var ress = function(res){
		return {
			"total":res.count,
			"rows":res.data
		}
	}
	var check = function(row){
		console.log(row)
	}
    //得到查询的参数
    oTableInit.queryParams = function (params) {
        var temp = {   //这里的键的名字和控制器的变量名必须一直，这边改动，控制器也需要改成一样的
            limit: params.limit,   //页面大小
            rowoffset: params.offset,  //页码
            keyword:params.search,//搜索
			sortOrder: params.order,//排序
          sortName:params.sort//排序字段
        };
        return temp;
    };
    return oTableInit;
};
var ButtonInit = function () {
    var oInit = new Object();
    var postdata = {};

    oInit.Init = function () {
        //初始化页面上面的按钮事件
    };

    return oInit;
};
	</script>
