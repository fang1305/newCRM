<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>销售会邀约</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/liaisons.css" />
		<style type="text/css">
			.custom_list .list_table table{
				position: absolute;top: 0;width: 100%;
			}
			.list_table tr,.list_table th{
				min-width: 120px;
			}
			.list_table th:nth-child(2){
				min-width: 90px;
			}
			.list_table td:nth-child(4){
				min-width: 300px;
			}
			.list_table tr a{
				text-decoration: none!important;
				cursor: pointer;
			}
			.fl_l{
				float:left
			}
			.line_title{
				width: 110px;
				line-height: 33px;
			}
			.line_area{
				width: 400px;
			}
			.line_radio{
				padding-top: 5px;
			}
			.mg_t{
				margin-top:24px!important;
			}
			.invite_reason{
				display: none;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						销售会邀约
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">销售会邀约</div>
						<div class="btn_group">
							<!--<button data-toggle="modal" data-target="#myModal" type="button" class="btn btn-default">添加</button>-->
						</div>
					</div>
					<div class="custom_list" >
						<div class="title_hide"></div>
						<div class="list_table" style="width: 100%;">
							<table class="table table-bordered table-striped text-center">
							  	<thead>
							  		<tr>
							  			<th>姓名</th>	
							  			<th>性别</th>	
								  		<th>电话</th>	
								  		<th>参会时间 / 不参会原因</th>	
								  		<th>状态</th>
								  		<th>操作</th>	
							  		</tr>
							  	</thead>
							  	<tbody>
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td>未邀请</td>
							  			<td>	
							  				<a data-toggle="modal" data-target="#myModal" class="btn-sm btn-primary" role="button">邀请客户</a>	
							  			</td>
							  		</tr>
							  		<!--<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td>邀请-待参加</td>
							  			<td>
							  				<a href="###">参加</a>
							  			</td>
							  		</tr>-->
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td>邀请-未参加</td>
							  			<td>
							  				<a data-toggle="modal" data-target="#myModal" class="btn-sm btn-primary" role="button">邀请客户</a>	
							  			</td>
							  		</tr>
							  	</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
			
		</div>
		
		<!-- 模态框（Modal） -->
		<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							邀请用户
						</h4>
					</div>
					<div class="modal-body">
						<div class="row mg_t">
							<div class="line_title fl_l text_right">邀请方式：</div>
							<div class="line_radio fl_l">
								<input type="radio" name="invite" value="1"> 家访&nbsp;&nbsp;&nbsp;
								<input type="radio" name="invite" checked value="2"> 电访
							</div>
						</div>
						<div class="row mg_t">
							<div class="line_title fl_l text_right">是否参加：</div>
							<div class="line_radio fl_l">
								<input type="radio" name="yes" checked value="1"> 参加&nbsp;&nbsp;&nbsp;
								<input type="radio" name="yes" value="2"> 不参加
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">参会时间：</div>
							<div class="line_detail fl_l">
								<input type="date" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_reason">
							<div class="line_title fl_l text_right">不参会原因：</div>
							<div class="line_area fl_l">
								<textarea class="form-control" rows="5"></textarea>	
							</div>
						</div>
						<div class="row mg_t"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							提交
						</button>
					</div>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="http://cdn.static.runoob.com/libs/angular.js/1.4.6/angular.min.js"></script>
	<script type="text/javascript" src="../bootstrap-3.3.7-dist/js/bootstrap.min.js"></script>
	<script type="text/javascript" src="../js/index.js"></script>
	<script>
		$('input[name=yes]').click(function(){
			if($('input[name=yes]:checked').val()==1){
				$('.invite_time').show();
				$('.invite_reason').hide();
			}else{
				$('.invite_time').hide();
				$('.invite_reason').show();
			}
		})
	</script>
</html>
