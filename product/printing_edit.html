<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>印刷品信息</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
		<style type="text/css">
			.custom_list textarea{
				resize: none;
			}
			.guarantee_money .text_right{
				padding: 0 17px;
			}
			.fl_l{
				float: left;
			}
			.line_title{
				width: 180px;
			}
			.line_detail{
				width: 290px;
			}
			.line_content{
				width: 620px;
			}
			
			.width_little{
				width: 120px!important;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						印刷品
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							印刷品信息
						</div>
						<div class="btn_group">
							<button type="button" class="btn btn-primary">提交</button>
							<button type="button" class="btn btn-default">取消</button>
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">印刷品信息</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">印刷名名称</div>
								<div class="line_detail fl_l"><input type="text" class="form-control width_part" /></div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">印刷品描述</div>
								<div class="line_content fl_l">
									<textarea class="form-control" rows="7"></textarea>
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">页数</div>
								<div class="line_detail fl_l"><input type="text" class="form-control width_little" /></div>
								<div class="line_detail fl_l">
									<input type="checkbox" id="cancel" value="1"> 是否在仓库
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="../js/angular.min.js"></script>
</html>
