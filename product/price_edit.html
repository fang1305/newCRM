<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>产品价格清单</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
		<style type="text/css">
			td{
				border:none!important;			
			}
			.width_part{
				width: 80%!important;
			}
			.custom_list tr{
				height: 60px;
			}
			.custom_list tr td{
				line-height: 34px!important;
			}
			.custom_list textarea{
				resize: none;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						价格清单
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							产品价格清单
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">价格清单</div>
							<div class="row mg_t">
								<form method="post">
									<table class="table">
										<tr>
											<td class="text_right">价格清单名称 </td>
											<td><input type="text" class="form-control width_part" /></td>
											<td class="text_right">价格模型 </td>
											<td><input type="text" class="form-control width_part" /></td>
											<td class="text_right">货币代码 </td>
											<td><input type="text" class="form-control width_part" /></td>
										</tr>
										<tr>
											<td class="text_right">客户级别 </td>
											<td><input type="text" class="form-control width_part" /></td>
											<td class="text_right">国家 </td>
											<td><input type="text" class="form-control width_part" /></td>
											<td class="text_right">省 </td>
											<td><input type="text" class="form-control width_part" /></td>
										</tr>
										<tr>
											<td class="text_right">地域 </td>
											<td><input type="text" class="form-control width_part" /></td>
											<td class="text_right">有效起始日</td>
											<td><input type="date" class="form-control width_part" /></td>
											<td class="text_right">有效终止日</td>
											<td><input type="date" class="form-control width_part" /></td>
										</tr>
										<tr>
											<td rowspan="2" class="text_right">描述 </td>
											<td colspan="3" rowspan="2">
												<textarea class="form-control" rows="4"></textarea>
											</td>
											<td class="text_right">付款条款</td>
											<td><input type="text" class="form-control width_part" /></td>
										</tr>
										<tr>
											<td class="text_right">组织</td>
											<td><input type="text" class="form-control width_part" /></td>
										</tr>
										<tr>
											<td class="text_right">职位 </td>
											<td><input type="text" class="form-control width_part" /></td>
										</tr>
									</table>
									<div class="btn_group">
										<button type="submit" class="btn btn-primary">提交</button>
										<button type="button" class="btn btn-default">取消</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
			
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="../js/angular.min.js"></script>
</html>
