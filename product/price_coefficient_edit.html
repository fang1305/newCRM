<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>产品系数表格</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
		<style type="text/css">
			td{
				border:none!important;		
			}
			td:nth-child(2n+1){
				width: 12%;	
			}
			td:nth-child(2n){
				width: 21%;	
			}
			.width_part{
				width: 80%!important;
			}
			.custom_list tr{
				height: 60px;
			}
			.custom_list tr td{
				line-height: 34px!important;
			}
			.custom_list textarea{
				resize: none;
			}
			.table_border{
				border: 1px solid #ddd;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						价格系数
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							产品价格系数表格
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">产品价格系数表格</div>
							<div class="row mg_t">
								<form method="post">
									<table class="table">
										<tr>
											<td class="text_right">价格系数名称 </td>
											<td><input type="text" class="form-control width_part" /></td>
											<td class="text_right">价格系数类型 </td>
											<td>
												<select class="form-control width_part">
													<option value="01">应用于单一项目</option>
													<option value="02">应用于整个报价或定单</option>
												</select>
											</td>
											<td class="text_right">次序 </td>
											<td><input type="text" class="form-control width_part" /></td>
										</tr>
									</table>
									<table class="table table_border">
										<tr>
											<td class="text_right">业务组件名称 </td>
											<td>
												<select class="form-control width_part">
													<option value="01"></option>
												</select>
											</td>
											<td></td>
											<td>
												<input type="checkbox" value="1"> 常数
											</td>
											<td></td>
											<td>
												<input type="checkbox" value="2"> 映射系
											</td>
										</tr>
										<tr>
											<td class="text_right">业务组件字段 </td>
											<td>
												<select class="form-control width_part">
													<option value="01"></option>
												</select>
											</td>
											<td class="text_right">字段数值 </td>
											<td><input type="text" class="form-control width_part" /></td>
											<td class="text_right">映射系名称</td>
											<td>
												<select class="form-control width_part">
													<option value="01"></option>
												</select>
											</td>
										</tr>
										<tr>
											<td class="text_right">操作符 </td>
											<td>
												<select class="form-control width_part">
													<option value="01">=</option>
													<option value="02"><></option>
													<option value="03"><</option>
													<option value="04">></option>
													<option value="05"><=</option>
													<option value="06">>=</option>
													<option value="07">EXIST IN</option>
													<option value="08">DO NOT EXIST IN</option>
												</select>
											</td>
											<td></td>
											<td></td>
											<td class="text_right">映射系字段</td>
											<td>
												<select class="form-control width_part">
													<option value="01"></option>
												</select>
											</td>
										</tr>
									</table>
									<table class="table">
										<tr>
											<td class="text_right">有效起始日 </td>
											<td><input type="date" class="form-control width_part" /></td>
											<td class="text_right">有效终止日 </td>
											<td><input type="date" class="form-control width_part" /></td>
											<td class="text_right">备注 </td>
											<td><input type="text" class="form-control width_part" /></td>
										</tr>
										<tr>
											<td class="text_right">针对价格 </td>
											<td>
												<select class="form-control width_part">
													<option value="01">基本价格</option>
													<option value="02">当前价格</option>
												</select>
											</td>
											<td class="text_right">价格调整类型 </td>
											<td>
												<select class="form-control width_part">
													<option value="01">绝对值</option>
													<option value="02">百分数</option>
													<option value="03">价格提升</option>
													<option value="04">价格替换</option>
												</select>
											</td>
											<td class="text_right">调整值 </td>
											<td><input type="text" class="form-control width_part" /></td>
										</tr>
									</table>
									<div class="btn_group">
										<button type="submit" class="btn btn-primary">提交</button>
										<button type="button" class="btn btn-default">取消</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
			
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="../js/angular.min.js"></script>
</html>
