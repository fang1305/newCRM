<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>映射系列表</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/connect.css" />
		<style type="text/css">
			.custom_list .list_table table{
				position: absolute;top: 0;width: 100%;
			}
			.list_table tr,.list_table th,.cus_container th{
				min-width: 90px;
			}
			.list_table th:nth-child(2),.list_table th:nth-child(1){
				min-width: 90px!important;
			}
			.cus_container{
				left: -2px;
			    height: 100%;
			    border-left: 1px solid #ddd;
			    border-bottom: none;
			    border-right: none;
			    line-height: 40px;
			}
			.cus_container tr, .cus_container th{
				height: 40px;
				line-height: 40px;
				text-align: center;
			}
			.custom_list{
				overflow: auto;
			}
			.text_right{
				padding: 0 17px;
			}
			.fl_l{
				float: left;
			}
			.line_title{
				width: 120px;
				line-height: 33px;
			}
			.line_detail{
				width: 290px;
			}
			.line_content{
				width: 410px;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						映射系
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">映射系列表</div>
						<div class="btn_group">
							<button type="button" data-toggle="modal" data-target="#myModal" class="btn btn-default">添加映射系</button>
							<button type="button" data-toggle="modal" data-target="#myModal_text" class="btn btn-default">添加字段</button>
						</div>
					</div>
					<div class="custom_list" >
						<div class="title_hide"></div>
						<div class="list_table col-sm-7">
							<table class="table table-bordered table-striped text-center">
							  	<thead>
							  		<tr>
							  			<th>映射系名称</th>	
							  			<th>业务组件名称</th>
								  		<th>备注</th>	
							  		</tr>
							  	</thead>
							  	<tbody>
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  		</tr>
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  		</tr>
							  	</tbody>
							</table>
						</div>
						<div class="cus_container col-sm-5">
							<table class="table_line table table-bordered table-striped text-center">
							  	<thead>
							  		<tr>
							  			<th colspan="3">映射系字段</th>	
							  		</tr>
							  		<tr>
							  			<th>字段名称</th>	
							  			<th>搜索规则</th>	
							  			<th>备注</th>	
							  		</tr>
							  	</thead>
							  	<tbody>
							  		<tr>
							  			<td>002212</td>
							  			<td></td>
							  			<td></td>
							  		</tr>
							  	</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
		
		<!-- 模态框（Modal） -->
		<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							添加映射系
						</h4>
					</div>
					<div class="modal-body">
						<div class="row mg_t">
							<div class="line_title fl_l text_right">映射系名称</div>
							<div class="line_detail fl_l"><input type="text" class="form-control width_part" /></div>
						</div>
						<div class="row mg_t">
							<div class="line_title fl_l text_right">业务组件名称</div>
							<div class="line_detail fl_l">
								<select class="form-control">
									<option value="01"></option>
								</select>
							</div>
						</div>
						<div class="row mg_t">
							<div class="line_title fl_l text_right">备注</div>
							<div class="line_content fl_l">
								<textarea class="form-control" rows="5"></textarea>
							</div>
						</div>
						<div class="row mg_t"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							确认添加
						</button>
					</div>
				</div>
			</div>
		</div>
		<!-- 模态框（Modal） -->
		<div class="modal fade" id="myModal_text" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							添加映射系字段
						</h4>
					</div>
					<div class="modal-body">
						<div class="row mg_t">
							<div class="line_title fl_l text_right">字段名称</div>
							<div class="line_detail fl_l"><input type="text" class="form-control width_part" /></div>
						</div>
						<div class="row mg_t">
							<div class="line_title fl_l text_right">搜索规则</div>
							<div class="line_detail fl_l">
								<select class="form-control">
									<option value="01"></option>
								</select>
							</div>
						</div>
						<div class="row mg_t">
							<div class="line_title fl_l text_right">备注</div>
							<div class="line_content fl_l">
								<textarea class="form-control" rows="5"></textarea>
							</div>
						</div>
						<div class="row mg_t"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							确认添加
						</button>
					</div>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="../js/angular.min.js"></script>
</html>
