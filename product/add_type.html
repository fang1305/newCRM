<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>添加产品类别</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
		<style type="text/css">
			.custom_list textarea{
				resize: none;
			}
			.guarantee_money .text_right{
				padding: 0 17px;
			}
			.fl_l{
				float: left;
			}
			.line_title{
				width: 180px;
			}
			.line_detail{
				width: 290px;
			}
			.line_content{
				width: 620px;
			}
			
			.width_little{
				width: 120px!important;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						产品类别
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							产品类别
						</div>
						<div class="btn_group">
							<button type="button" class="btn btn-default">提交</button>
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">添加产品类别</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">产品类别名称</div>
								<div class="line_detail fl_l"><input type="text" class="form-control width_part" /></div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">备注</div>
								<div class="line_content fl_l"><input type="text" class="form-control width_part" /></div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">类别中产品</div>
								<div class="line_content fl_l">
									<textarea class="form-control" rows="7"></textarea>
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">&nbsp;</div>
								<div class="line_content fl_l">
									<button type="button" data-toggle="modal" data-target="#myModal" class="btn btn-default">添加产品</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		
		<!-- 模态框（Modal） -->
		<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							产品选择列表
						</h4>
					</div>
					<div class="modal-body">
						<table class="table table-bordered text-center">
							<thead>
								<tr>
									<th><input type="checkbox" /></th>
									<th>产品名称</th>
									<th>产品号</th>
									<th>产品规格</th>
								</tr>
							</thead>
							<tbody>
								<tr>
									<th><input type="checkbox" /></th>
									<td></td>
									<td></td>
									<td></td>
								</tr>
							</tbody>
						</table>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							确认选中
						</button>
					</div>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="../js/angular.min.js"></script>
</html>
