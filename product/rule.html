<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>产品构造规则</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/zTreeStyle/zTreeStyle.css" type="text/css">
		<link rel="stylesheet" href="../css/customer/place.css" />
		<style type="text/css">
			ul.ztree {
				width:90%;height:520px;overflow:auto;margin-top: -6px;
			}
			.ztree li span{
				font-size: 15px;
			}
			.ztree li {
    			padding: 3px;
    		}
    		.guarantee_money{
    			min-height: 556px;
    		}
    		.part_left{
    			width: 25%;float: left;margin-right: 1%;
    		}
    		.part_right{
    			width: 74%;float: left;
    		}
    		.text_right{
				padding: 0 17px;
			}
			.fl_l{
				float: left;
			}
			.line_title{
				width: 150px;
				line-height: 33px;
			}
			.line_detail{
				width: 290px;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						构造规则
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							产品构造规则
						</div>
						<div class="btn_group">
							<a href="rule_type.html"><button type="button" class="btn btn-default">共存规则</button></a>
							<a href="rule_exclude.html"><button type="button" class="btn btn-default">排斥规则</button></a>
							<a href="rule_accumulate.html"><button type="button" class="btn btn-default">累积规则</button></a>
							<a href="rule_consume.html"><button type="button" class="btn btn-default">消耗规则</button></a>
							<a href="rule_recommend.html"><button type="button" class="btn btn-default">推荐规则</button></a>
							<a href="rule_number.html"><button type="button" class="btn btn-default">数量规则</button></a>
							<a href="structural_conditions.html"><button type="button" class="btn btn-default">产品构造条件</button></a>
						</div>
					</div>
					<div class="custom_list" >
						<div class="row" style="position: relative;">
							<div class="guarantee_money part_left">
								<div class="guarantee_title">产品模型目录</div>
								<div class="row mg_t">
									<ul id="treeDemo" class="ztree"></ul>
								</div>
							</div>
							<div class="guarantee_money tab-content part_right">
								<div class="guarantee_title">产品构造规则</div>
								<div class="mg_t">
									<table class="table table-bordered table-striped text-center">
									  	<thead>
									  		<tr>
									  			<th>项目名称</th>	
									  			<th>规则类型</th>
									  		</tr>
									  	</thead>
									  	<tbody>
									  		<tr>
									  			<td></td>
									  			<td></td>
									  		</tr>
									  	</tbody>
									</table>
									
									<div class="btn_group">
										<button data-toggle="modal" data-target="#myModal" type="button" class="btn btn-primary">添加</button>
										<button type="button" class="btn btn-danger">删除</button>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		
		<!-- 模态框（Modal） -->
		<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							添加产品构造规则
						</h4>
					</div>
					<div class="modal-body">
						<div class="row mg_t">
							<div class="line_title fl_l text_right">项目名称</div>
							<div class="line_detail fl_l"><input type="text" class="form-control width_part" /></div>
						</div>
						<div class="row mg_t">
							<div class="line_title fl_l text_right">规则类型</div>
							<div class="line_detail fl_l">
								<select class="form-control">
									<option value="01">共存规则</option>
									<option value="02">排斥规则</option>
									<option value="03">累积规则</option>
									<option value="04">消耗规则</option>
									<option value="05">推荐规则</option>
									<option value="06">数量规则</option>
								</select>
							</div>
						</div>
						<div class="row mg_t"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							确认添加
						</button>
					</div>
				</div>
			</div>
		</div>

	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="http://cdn.static.runoob.com/libs/angular.js/1.4.6/angular.min.js"></script>
	<script src="../js/jquery.ztree.core.js"></script>
	<script type="text/javascript">
		var setting = {
			view: {
				showIcon: showIconForTree
			},
			data: {
				simpleData: {
					enable: true
				}
			}
		};
		var zNodes =[
			{ id:1, pId:0, name:"手机", open:true},
			{ id:11, pId:1, name:"诺基亚"},
			{ id:111, pId:11, name:"诺基亚8810手机"},
			{ id:1111, pId:111, name:"介绍"},
			{ id:1112, pId:111, name:"技术参数"},
			{ id:12, pId:1, name:"爱立信"},
			{ id:121, pId:12, name:"爱立信手机"},
			{ id:2, pId:0, name:"电池板", isParent:true},
			{ id:3, pId:0, name:"充电器", isParent:true},
			{ id:3, pId:0, name:"服务", isParent:true}
		];

		function showIconForTree(treeId, treeNode) {
			return !treeNode.isParent;
		};

		$(document).ready(function(){
			$.fn.zTree.init($("#treeDemo"), setting, zNodes);
		});
	</script>
</html>
