<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>产品模型信息</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
		<style type="text/css">
			.position_re{
				position: relative!important;
			}
			.position_ab{
				position: absolute!important;
				right: 4%!important;
				top: 10px!important;
			}
			.modal tr{
				height: 34px;
			}
			.modal th{
				text-align: center;
			}
			.custom_list textarea{
				resize: none;
			}
			.guarantee_money .text_right{
				padding: 0 17px;
			}
			.fl_l{
				float: left;
			}
			.line_title{
				width: 180px;
			}
			.line_detail{
				width: 290px;
			}
			.line_content{
				width: 620px;
			}
			
			.width_little{
				width: 120px!important;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						产品模型
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							产品模型
						</div>
						<div class="btn_group">
							<button type="button" class="btn btn-primary">提交</button>
							<button type="button" class="btn btn-default">取消</button>
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">产品模型</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">产品模型名称</div>
								<div class="line_detail fl_l"><input type="text" class="form-control width_part" /></div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">最新版本号</div>
								<div class="line_detail fl_l position_re">
									<input  data-toggle="modal" data-target="#myModal" type="text" class="form-control width_part" />
									<span class="position_ab glyphicon glyphicon-th"></span>
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">描述</div>
								<div class="line_content fl_l">
									<textarea class="form-control" rows="7"></textarea>
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">备注</div>
								<div class="line_content fl_l">
									<input type="text" class="form-control width_part" />
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">安装数量</div>
								<div class="line_detail fl_l"><input type="text" class="form-control width_little" /></div>
								<div class="line_detail fl_l">
									<input type="checkbox" id="cancel" value="1"> 锁定
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		
		<!-- 模态框（Modal） -->
		<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							版本号信息
						</h4>
					</div>
					<div class="modal-body">
						<table class="table table-bordered text-center">
							<thead>
								<tr>
									<th>版本号</th>
									<th>模型描述</th>
									<th>创建日期</th>
								</tr>
							</thead>
							<tbody>
								<tr>
									<td>00100</td>
									<td></td>
									<td></td>
								</tr>
							</tbody>
						</table>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							提交更改
						</button>
					</div>
				</div><!-- /.modal-content -->
			</div><!-- /.modal -->
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="../js/angular.min.js"></script>
</html>
