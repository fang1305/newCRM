<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>产品价格表格</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
		<style type="text/css">
			td{
				border:none!important;			
			}
			.width_part{
				width: 55%!important;
			}
			.fl_l{
				float: left;
			}
			.line_title{
				width: 140px;
			}
			.line_detail{
				width: 290px;
			}
			.line_content{
				width: 745px;
			}
			.text_right{
				padding: 0 17px;
			}
			.line_top{
				margin-top: 15px;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						价格列表
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							产品价格表格
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">产品价格表格</div>
							<div class="row mg_t">
								<form method="post">
									<div class="row">
										<div class="col-xs-4 line_top">
											<div class="form-group">
											    <label class="line_title text_right fl_l">产品名称</label>
											    <select class="form-control width_part">
													<option value="01"></option>
												</select>
											</div>
										</div>
										<div class="col-xs-4 line_top">
											<div class="form-group">
											    <label class="line_title text_right fl_l">产品号</label>
											    <select class="form-control width_part">
													<option value="01"></option>
												</select>
											</div>
										</div>
										<div class="col-xs-4 line_top">
											<div class="form-group">
											    <label class="line_title text_right fl_l">定价单位</label>
											    <select class="form-control width_part">
													<option value="01"></option>
												</select>
											</div>
										</div>
										<div class="col-xs-4 line_top">
											<div class="form-group">
											    <label class="line_title text_right fl_l">清单价格</label>
											    <input type="number" class="form-control width_part" value="0" />
											</div>
										</div>
									</div>
									<div class="row">
										<div class="col-xs-4 line_top">
											<div class="form-group">
											    <label class="line_title text_right fl_l">最高销售价格</label>
											    <input type="number" class="form-control width_part" />
											</div>
										</div>
										<div class="col-xs-4 line_top">
											<div class="form-group">
											    <label class="line_title text_right fl_l">最低销售价格</label>
											    <input type="number" class="form-control width_part" />
											</div>
										</div>
										<div class="col-xs-4 line_top">
											<div class="form-group">
											    <label class="line_title text_right fl_l">批量折扣</label>
											    <select class="form-control width_part">
													<option value="01"></option>
												</select>
											</div>
										</div>
										<div class="col-xs-4 line_top">
											<div class="form-group">
											    <label class="line_title text_right fl_l">产品服务费%</label>
											    <input type="number" class="form-control width_part" />
											</div>
										</div>
										<div class="col-xs-4 line_top">
											<div class="form-group">
											    <label class="line_title text_right fl_l">计费方法</label>
											    <select class="form-control width_part">
													<option value="01">应用于清单价格</option>
													<option value="01">销售价格</option>
												</select>
											</div>
										</div>
									</div>
									<div class="btn_group">
										<button type="submit" class="btn btn-primary">提交</button>
										<button type="button" class="btn btn-default">取消</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
			
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="../js/angular.min.js"></script>
</html>
