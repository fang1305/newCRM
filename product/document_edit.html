<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>产品文档</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
		<style type="text/css">
			td{
				border:none!important;			
			}
			.width_part{
				width: 80%!important;
			}
			.custom_list tr{
				height: 60px;
			}
			.custom_list tr td{
				line-height: 34px!important;
			}
			.custom_list textarea{
				resize: none;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						产品文档
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							产品文档信息
						</div>
						<div class="btn_group">
							<button type="button" class="btn btn-default">提交</button>
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">产品文档</div>
							<div class="row mg_t">
								<table class="table">
									<tr>
										<td class="text_right">资料名称 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">资料编号 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">资料类型 </td>
										<td>
											<select class="form-control width_part">
												<option value="01">用户手册</option>
												<option value="02">产品图片</option>
												<option value="03">技术参数</option>
											</select>
										</td>
									</tr>
									<tr>
										<td class="text_right">文件类型 </td>
										<td>
											<select class="form-control width_part">
												<option value="01">.doc</option>
												<option value="02">.pdf</option>
											</select>
										</td>
										<td class="text_right">文件大小 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">作者 </td>
										<td><input type="text" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td rowspan="2" class="text_right">描述 </td>
										<td colspan="3" rowspan="2">
											<textarea class="form-control" rows="4"></textarea>
										</td>
										<td class="text_right">有效起始日</td>
										<td><input type="date" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td class="text_right">有效终止日</td>
										<td><input type="date" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td class="text_right">分发方式 </td>
										<td>
											<select class="form-control width_part">
												<option value="01">自动分发</option>
												<option value="02">文件请求</option>
											</select>
										</td>
										<td class="text_right"> </td>
										<td>
											<input type="checkbox" id="inlineCheckbox1" value="option1"> 本地&nbsp;&nbsp;&nbsp;
											<input type="checkbox" id="cancel" value="1"> 文件请求
										</td>
										<td class="text_right">文件名称 </td>
										<td><input type="text" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td class="text_right">修改日期 </td>
										<td><input type="date" class="form-control width_part" /></td>
										<td class="text_right"> </td>
										<td>
											<input type="checkbox" id="update" value="0"> 自动更新&nbsp;&nbsp;&nbsp;
											<input type="checkbox" id="self" value="1"> 内部参考
										</td>
										<td class="text_right">客户 </td>
										<td><input type="text" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td class="text_right">竞争对手 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">行业 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">产品 </td>
										<td><input type="text" class="form-control width_part" /></td>
									</tr>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
			
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="../js/angular.min.js"></script>
</html>
