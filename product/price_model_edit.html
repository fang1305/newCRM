<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>价格模型编辑信息</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
		<style type="text/css">
			.custom_list textarea{
				resize: none;
			}
			.guarantee_money .text_right{
				padding: 0 17px;
			}
			.fl_l{
				float: left;
			}
			.line_title{
				width: 180px;
			}
			.line_detail{
				width: 290px;margin-right: 20px;
			}
			.line_content{
				width: 620px;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						价格模型
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							价格模型
						</div>
						<div class="btn_group">
							<button type="button" class="btn btn-primary">提交</button>
							<button type="button" class="btn btn-defult">取消</button>
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">价格模型信息</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">价格模型名称</div>
								<div class="line_detail fl_l"><input type="text" class="form-control width_part" /></div>
								<input type="checkbox" /> 锁定
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">锁定人</div>
								<div class="line_detail fl_l">
									<select class="form-control">
										<option value="01"></option>
									</select>
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">货币代码</div>
								<div class="line_detail fl_l">
									<select class="form-control">
										<option value="01"></option>
									</select>
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">有效起始日</div>
								<div class="line_detail fl_l">
									<input type="date" class="form-control width_part" />
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">有效终止日</div>
								<div class="line_detail fl_l">
									<input type="date" class="form-control width_part" />
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">描述</div>
								<div class="line_content fl_l">
									<textarea class="form-control" rows="4"></textarea>
								</div>
							</div>
							<div class="row mg_t">
								<div class="line_title fl_l text_right">备注</div>
								<div class="line_content fl_l">
									<textarea class="form-control" rows="3"></textarea>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="../js/angular.min.js"></script>
</html>
