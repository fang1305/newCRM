<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>客户积分</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/liaisons.css" />
		<style type="text/css">
			.custom_list .list_table table{
				position: absolute;top: 0;width: 100%;
			}
			.list_table tr,.list_table th{
				min-width: 150px;
			}
			.list_table th:nth-child(2){
				min-width: 120px;
			}
			.list_table th:nth-child(14){
				min-width: 230px;
			}
			.custom_list{
				overflow: auto;
			}
			.line_title{
				width: 125px;
				line-height: 33px;
			}
			.line_detail{
				width: 300px;
			}
			.fl_l{
				float: left;
			}
			.mg_t15{
				margin-top: 20px!important;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						客户积分
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">客户积分</div>
						<div class="btn_group">
							<a data-toggle="modal" data-target="#myModal"><button type="button" class="add_new btn btn-primary">添加</button></a>
						</div>
					</div>
					<div class="custom_list" >
						<div class="title_hide"></div>
						<div class="list_table width_full">
							<table class="table table-bordered table-striped text-center">
							  	<thead>
							  		<tr>
							  			<th>客户名称</th>	
							  			<th>客户来源</th>	
							  			<th>转介人</th>	
								  		<th>会员类型</th>	
								  		<th>积分类型</th>	
								  		<th>订单编号</th>	
								  		<th>修改时间</th>	
								  		<th>变动前积分</th>	
								  		<th>变动前累计积分</th>	
								  		<th>变动后积分</th>	
								  		<th>变动前可用积分</th>	
								  		<th>变动后可用积分</th>	
								  		<th>积分变化值</th>	
								  		<th>描述</th>	
								  		<th>操作</th>	
							  		</tr>
							  	</thead>
							  	<tbody>
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td>
							  				<a  class="btn-sm btn-info" role="button" data-toggle="modal" data-target="#myModal">编辑</a>
							  				<a  class="btn-sm btn-danger" role="button" href="###">删除</a>
							  			</td>
							  		</tr>
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td>
							  				<a  data-toggle="modal" data-target="#myModal" role="button" class="btn-sm btn-info">编辑</a>
							  				<a  class="btn-sm btn-danger" role="button" href="###">删除</a>
							  			</td>
							  		</tr>
							  	</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
		
		<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							客户积分
						</h4>
					</div>
					<div class="modal-body">
						<div class="row">
							<div class="line_title fl_l text_right">客户：</div>
							<div class="line_detail fl_l">
								<select class="form-control width_part edit_name" disabled>
									<option value="01">名字</option>
								</select>
							</div>
						</div>
						<div class="row mg_t15">
							<div class="line_title fl_l text_right">现有积分：</div>
							<div class="line_title fl_l custom_num">1100</div>
							<div class="line_title fl_l text_right">现可用积分：</div>
							<div class="line_title fl_l custom_num">980</div>
						</div>
						<div class="row">
							<div class="line_title fl_l text_right">现累计积分：</div>
							<div class="line_title fl_l custom_num">1500</div>
							<div class="line_title fl_l text_right">会员类型：</div>
							<div class="line_title fl_l custom_num">B类-重点</div>
						</div>
						<div class="row mg_t15">
							<div class="line_title fl_l text_right">订单编号：</div>
							<div class="line_detail fl_l"><input type="number" class="form-control" /></div>
						</div>
						<div class="row mg_t15">
							<div class="line_title fl_l text_right">积分类型：</div>
							<div class="line_detail fl_l">
								<select class="form-control width_part">
									<option value="01">产品积分</option>
								</select>
							</div>
						</div>
						<div class="row mg_t15">
							<div class="line_title fl_l text_right">积分变化值：</div>
							<div class="line_detail fl_l"><input type="number" class="form-control" /></div>
						</div>
						<div class="row pre_no mg_t15">
							<div class="line_title fl_l text_right">描述：</div>
							<div class="line_detail fl_l goods_no"><input type="text" class="form-control width_part" /></div>
						</div>
						<div class="row mg_t15"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							提交
						</button>
					</div>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="http://cdn.static.runoob.com/libs/angular.js/1.4.6/angular.min.js"></script>
	<script type="text/javascript">
		$('.add_new').click(function(){
			$('.edit_name').attr("disabled",false);
			$('.custom_num').html('-');
		})
	</script>
</html>
