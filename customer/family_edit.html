<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>家庭信息管理</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
		<style type="text/css">
			td{
				border:none!important;			
			}
			.width_part{
				width: 80%!important;
			}
			.custom_list tr{
				height: 60px;
			}
			.custom_list tr td{
				line-height: 34px!important;
			}
			.custom_list textarea{
				resize: none;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						家庭信息
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							家庭信息管理
						</div>
						<div class="btn_group">
							<button type="button" class="btn btn-default">提交</button>
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">家庭信息</div>
							<div class="row mg_t">
								<table class="table">
									<tr>
										<td class="text_right">家庭编号 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">家庭名称 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">姓名 </td>
										<td><input type="text" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td class="text_right">主要联系方式 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">传真 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">邮编 </td>
										<td><input type="text" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td class="text_right">国家 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">城市 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">省份 </td>
										<td><input type="text" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td class="text_right">地址 </td>
										<td colspan="3"><input type="text" class="form-control" /></td>
										<td class="text_right">家庭收入 </td>
										<td><input type="text" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td class="text_right">状态 </td>
										<td><input type="text" class="form-control width_part" /></td>
										<td class="text_right">级别 </td>
										<td>
											<select class="form-control">
												<option value="01">金卡</option>
												<option value="02">银卡</option>
												<option value="03">普卡</option>
											</select>
										</td>
										<td class="text_right">公司收益 </td>
										<td><input type="text" class="form-control width_part" /></td>
									</tr>
									<tr>
										<td class="text_right">细分 </td>
										<td>
											<select class="form-control">
												<option value="01">--选择--</option>
											</select>
										</td>
										<td class="text_right">客户服务组 </td>
										<td><input type="text" class="form-control" /></td>
									</tr>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
			
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="http://cdn.static.runoob.com/libs/angular.js/1.4.6/angular.min.js"></script>
</html>
