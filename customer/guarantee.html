<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>客户担保信息</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/guarantee.css" />
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						客户担保
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							客户担保信息
						</div>
						<div class="btn_group">
							<button type="button" class="btn btn-default">编辑</button>
						</div>
					</div>
					<div class="custom_list" >
						<div class="radio">
							<label class="radio-inline">
						        <input type="radio" name="guarantee_type" value="0" checked> 						    
								保证金
							</label>
							<label class="radio-inline mg_l">
						        <input type="radio" name="guarantee_type" value="1"> 						    
								担保人
							</label>
						</div>
						<div class="guarantee_money">
							<div class="guarantee_title">保证金</div>
							<div class="row mg_t">
								<div class="col-sm-1 text_right">保证金数额：</div>
								<div class="col-sm-2"><input type="number" class="form-control" /></div>
							</div>
						</div>
						<div class="guarantee_money">
							<div class="guarantee_title">担保人</div>
							<div class="row mg_t">
								<div class="col-sm-1 text_right">姓名：</div>
								<div class="col-sm-2"><input type="text" class="form-control" /></div>
								<div class="col-sm-1 text_right">身份证号：</div>
								<div class="col-sm-2"><input type="text" class="form-control" /></div>
								<div class="col-sm-1 text_right">电话号码：</div>
								<div class="col-sm-2"><input type="text" class="form-control" /></div>
								<div class="col-sm-1 text_right">邮编：</div>
								<div class="col-sm-2"><input type="text" class="form-control" /></div>
							</div>
							<div class="row mg_t">
								<div class="col-sm-1 text_right">国家：</div>
								<div class="col-sm-2"><input type="text" class="form-control" /></div>
								<div class="col-sm-1 text_right">省份：</div>
								<div class="col-sm-2"><input type="text" class="form-control" /></div>
								<div class="col-sm-1 text_right">城市：</div>
								<div class="col-sm-2"><input type="text" class="form-control" /></div>
								<div class="col-sm-1 text_right">区域：</div>
								<div class="col-sm-2"><input type="text" class="form-control" /></div>
							</div>
							<div class="row mg_t">
								<div class="col-sm-1 text_right">地址：</div>
								<div class="col-sm-5"><input type="text" class="form-control" /></div>
								<div class="col-sm-1 text_right">其他联系渠道：</div>
								<div class="col-sm-2">
									<select class="form-control">
										<option value="01">邮箱</option>
										<option value="02">个人首页</option>
										<option value="03">暂无</option>
									</select>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="http://cdn.static.runoob.com/libs/angular.js/1.4.6/angular.min.js"></script>
</html>
