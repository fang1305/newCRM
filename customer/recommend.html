<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>客户推荐信息</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/liaisons.css" />
		<style type="text/css">
			.custom_list .list_table table{
				position: absolute;top: 0;width: 100%;
			}
			.list_table tr,.list_table th{
				min-width: 120px;
			}
			.list_table th:nth-child(2){
				min-width: 150px;
			}
			.list_table th:nth-child(3){
				min-width: 120px;
			}
			.list_table th:nth-child(6){
				min-width: 420px;
			}
			.line_title{
				width: 110px;line-height: 33px;
			}
			.line_detail{
				width: 320px;
			}
			.line_info{
				width:380px;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						客户推荐
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">客户推荐信息</div>
						<div class="btn_group">
							<button type="button" class="btn btn-primary" data-toggle="modal" data-target="#myModal">添加</button>
						</div>
					</div>
					<div class="custom_list" >
						<div class="title_hide"></div>
						<div class="list_table" style="width: 100%;">
							<table class="table table-bordered table-striped text-center">
							  	<thead>
							  		<tr>
							  			<th>推荐人</th>	
							  			<th>推荐日期</th>	
								  		<th>推荐客户</th>	
								  		<th>推荐产品</th>	
								  		<th>渠道</th>	
								  		<th>渠道描述</th>	
								  		<th>操作</th>	
							  		</tr>
							  	</thead>
							  	<tbody>
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td>
							  				<a  class="btn btn-sm btn-info" data-toggle="modal" data-target="#myModal">编辑</a>
							  			</td>
							  		</tr>
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td>
							  				<a  class="btn btn-sm btn-info" data-toggle="modal" data-target="#myModal">编辑</a>
							  			</td>
							  		</tr>
							  	</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							客户推荐信息
						</h4>
					</div>
					<div class="modal-body">
						<div class="row mg_t">
							<div class="line_title left text_right">推荐人：</div>
							<div class="line_detail left">
								<select class="form-control">
									<option value="01">姓名</option>
								</select>
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">推荐日期：</div>
							<div class="line_detail left">
								<input type="date" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">推荐客户：</div>
							<div class="line_detail left">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">推荐产品：</div>
							<div class="line_detail left">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">渠道：</div>
							<div class="line_detail left">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">渠道描述：</div>
							<div class="line_info left">
								<textarea class="form-control" rows="5"></textarea>	
							</div>	
						</div>
						<div class="row mg_t"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							提交
						</button>
					</div>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="http://cdn.static.runoob.com/libs/angular.js/1.4.6/angular.min.js"></script>
</html>
