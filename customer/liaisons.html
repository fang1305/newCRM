<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>个人用户户主</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/liaisons.css" />
		<style>
			.line_detail{
				width: 360px;
			}
			.line_title{
				width: 120px;
			}
		</style>
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						联络人就业
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">联络人就业信息</div>
						<div class="btn_group">
							<button type="button" data-toggle="modal" data-target="#myModal"  class="btn btn-default">添加</button>
							<a href="edit_customer.html"><button type="button" data-toggle="modal" data-target="#myModal"  class="btn btn-default">修改</button></a>
						</div>
					</div>
					<div class="custom_list" >
						<div class="title_hide"></div>
						<div class="list_table">
							<table class="table table-bordered table-striped text-center">
							  	<thead>
							  		<tr>
							  			<th>雇主</th>	
							  			<th>聘用初始日期</th>	
								  		<th>聘用终止日期</th>	
								  		<th>职务</th>	
								  		<th>职衔</th>	
								  		<th>收入</th>	
							  		</tr>
							  	</thead>
							  	<tbody>
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  		</tr>
							  		<tr>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  			<td></td>
							  		</tr>
							  	</tbody>
							</table>
						</div><!--
						<div class="cus_container">
							
						</div>-->
					</div>
				</div>
			</div>
		</div>
		<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							联络人就业信息
						</h4>
					</div>
					<div class="modal-body">
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">雇主：</div>
							<div class="line_detail left">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">聘用初始日期：</div>
							<div class="line_detail left">
								<input type="date" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">聘用终止日期：</div>
							<div class="line_detail left">
								<input type="date" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">职务：</div>
							<div class="line_detail left">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">职衔：</div>
							<div class="line_detail left">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title left text_right">收入：</div>
							<div class="line_detail left">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							提交
						</button>
					</div>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="http://cdn.static.runoob.com/libs/angular.js/1.4.6/angular.min.js"></script>
</html>
