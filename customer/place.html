<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>客户地址信息</title>
		<link rel="stylesheet" href="../bootstrap-3.3.7-dist/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/common.css" />
		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/customer/place.css" />
	</head>
	<body>
		<div class="content" ng-app="">
			<div class="headCom"></div>
			<div ng-include="'../head.html'"></div>
			<div class="main_body">
				<div class="place_set">
					<div class="place">
						<span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
						客户地址
					</div>
				</div>
				<div class="custom_main">
					<div class="main_title">
						<div class="title left">
							客户地址信息
						</div>
					</div>
					<div class="custom_list" >
						<div class="guarantee_money">
							<div class="guarantee_title">客户邮寄地址列表</div>
							<div class="row mg_t">
								<table class="table table-bordered table-striped text-center">
								  	<thead>
								  		<tr>
								  			<th><input type="checkbox"  /></th>
								  			<th>姓名</th>	
								  			<th>主要</th>	
									  		<th>其他联系渠道</th>	
									  		<th>用途</th>	
									  		<th>地址</th>	
									  		<th>邮编</th>	
									  		<th>国家</th>	
									  		<th>省份</th>	
									  		<th>城市</th>	
									  		<th>有效日期</th>	
									  		<th>失效日期</th>	
								  		</tr>
								  	</thead>
								  	<tbody>
								  		<tr>
								  			<td><input type="checkbox"  /></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  		</tr>
								  		<tr>
								  			<td><input type="checkbox"  /></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  		</tr>
								  	</tbody>
								</table>
								<div class="btn_group">
									<button type="button"  data-toggle="modal" data-target="#placeModal" class="btn btn-primary">添加</button>
									<button type="button" class="btn btn-default">删除</button>
								</div>
							</div>
						</div>
						<div class="guarantee_money">
							<div class="guarantee_title">客户电子地址列表</div>
							<div class="row mg_t">
								<table class="table table-bordered table-striped text-center">
								  	<thead>
								  		<tr>
								  			<th><input type="checkbox"  /></th>
								  			<th>姓名</th>	
								  			<th>主要</th>	
									  		<th>其他联系渠道</th>	
									  		<th>电话号码</th>	
									  		<th>电子地址</th>	
									  		<th>有效日期</th>	
									  		<th>失效日期</th>	
								  		</tr>
								  	</thead>
								  	<tbody>
								  		<tr>
								  			<td><input type="checkbox"  /></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  		</tr>
								  		<tr>
								  			<td><input type="checkbox"  /></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  			<td></td>
								  		</tr>
								  	</tbody>
								</table>
								
								<div class="btn_group">
									<button type="button" class="btn btn-primary" data-toggle="modal" data-target="#myModal">添加</button>
									<button type="button" class="btn btn-default">删除</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			
		</div>
		
		<!-- 模态框（Modal） -->
		<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							添加电子地址
						</h4>
					</div>
					<div class="modal-body">
						<div class="row mg_t">
							<div class="line_title fl_l text_right">姓名：</div>
							<div class="line_title fl_l">
								客户姓名
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">主要：</div>
							<div class="line_detail fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">其他联系渠道：</div>
							<div class="line_detail fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">电话号码：</div>
							<div class="line_detail fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">电子地址：</div>
							<div class="line_detail fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">有效日期：</div>
							<div class="line_detail fl_l">
								<input type="date" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">失效日期：</div>
							<div class="line_detail fl_l">
								<input type="date" class="form-control">
							</div>	
						</div>
						<div class="row mg_t"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							提交
						</button>
					</div>
				</div>
			</div>
		</div>
		
		<div class="modal fade" id="placeModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							添加邮寄地址
						</h4>
					</div>
					<div class="modal-body">
						<div class="row mg_t">
							<div class="line_title fl_l text_right">姓名：</div>
							<div class="line_title fl_l">
								客户名称
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">主要：</div>
							<div class="line_detail fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">其他联系渠道：</div>
							<div class="line_detail fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">用途：</div>
							<div class="line_detail fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">地址：</div>
							<div class="line_detail fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">邮编：</div>
							<div class="line_detail fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">国家：</div>
							<div class="line_choose fl_l">
								<input type="text" class="form-control">
							</div>	
							<div class="line_place fl_l text_right">省份：</div>
							<div class="line_choose fl_l">
								<input type="text" class="form-control">
							</div>	
							<div class="line_place fl_l text_right">城市：</div>
							<div class="line_choose fl_l">
								<input type="text" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">有效日期：</div>
							<div class="line_detail fl_l">
								<input type="date" class="form-control">
							</div>	
						</div>
						<div class="row mg_t invite_time">
							<div class="line_title fl_l text_right">失效日期：</div>
							<div class="line_detail fl_l">
								<input type="date" class="form-control">
							</div>	
						</div>
						<div class="row mg_t"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">关闭
						</button>
						<button type="button" class="btn btn-primary">
							提交
						</button>
					</div>
				</div>
			</div>
		</div>
		
	</body>
	<script type="text/javascript" src="../js/jquery-3.3.1.js"></script>	
	<script src="http://cdn.static.runoob.com/libs/angular.js/1.4.6/angular.min.js"></script>
</html>
