<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
		<link rel="stylesheet" href="css/bootstrap.css" />
		<link rel="stylesheet" href="css/common.css" />
		<link rel="stylesheet" href="css/index.css" />
		<style type="text/css">
			body{
				background: #FFF;
			}
			.login_wrap{
				position: absolute;
				top: -20px;
				bottom: 0;
				width: 100%;
				background: #324157;
				background:url('img/index/bg1.jpg') no-repeat;
				background-size: 100% 100%; 
			}
			.resBox,.login_content,.login_title{
				width: 380px;
				height: 240px;
				background: rgba(255,255,255,.3);
				border-radius: 4px;
				position: absolute;
				left: 55%;
				/*right:50px;*/
				top: 45%;
				/*margin-left: -190px;*/
				margin-top:-70px;
			}
			.resBox{
				width: 150px;
				height: auto;
				left: 70%;
				top: 67px;
				margin-top: 0;
			}
			.login_content{
				padding: 40px;
				padding-bottom: 10px;
			}
			.login_content input{
				margin-bottom: 22px;
				height: 40px;
				line-height: 40px;
			}
			.login_content .btn{
			    background: #505050;
    			border: none;
				height: 36px;
				line-height: 23px;
				width: 300px;
				margin-bottom: 0;
			}
			.login_title{
				margin-top: -135px;
				height: auto;
				font-size: 25px;
			    text-align: center;
			    color: #fff;
			    background: none;
			}
		</style>
	</head>
	<body>
		<div class="login_wrap">
			<div class="login_title">CRM管理系统</div>
			<div class="login_content">
				<form action="index.html">
					<input class="form-control" type="text" placeholder="请输入用户名" />
					<input class="form-control" type="password" placeholder="请输入密码" />
					<input type="submit" class="btn btn-primary" value="登录" />
					<p style="font-size: 12px;line-height: 30px;color: rgb(153,153,153);">还没有账号?<a href="register.html">去注册</p>
				</form>
			</div>
		</div>
	</body>	
	<script type="text/javascript" src="js/jquery-3.3.1.js"></script>	
	<script type="text/javascript" src="js/bootstrap.js"></script>
</html>
